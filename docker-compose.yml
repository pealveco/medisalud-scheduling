services:
  postgres:
    image: postgres:16-alpine
    container_name: medisalud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-medisalud}
      POSTGRES_USER: ${DB_USER:-medisalud}
      POSTGRES_PASSWORD: ${DB_PASS:-medisalud}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - medisalud-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  medisalud-postgres-data:

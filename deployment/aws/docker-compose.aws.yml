services:
  app:
    image: medisalud-scheduling:aws
    container_name: medisalud-aws-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      APP_NAME: ${APP_NAME:-MediSalud-Scheduling}
      SERVER_PORT: 8080
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_DRIVER: ${DB_DRIVER:-org.postgresql.Driver}
      DB_DIALECT: ${DB_DIALECT:-org.hibernate.dialect.PostgreSQLDialect}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      MANAGEMENT_ENDPOINTS: ${MANAGEMENT_ENDPOINTS:-health,prometheus}
